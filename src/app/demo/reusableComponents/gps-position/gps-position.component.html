<div class="field">
  <div class="gps-wrap">
    <input
      type="text"
      [value]="value"
      [class.gps-ok]="status === 'ok'"
      [class.gps-error]="status === 'error'"
      placeholder="Ex : 7.7333, -5.0667"
      readonly
    />
    <button
      class="btn-gps"
      type="button"
      (click)="detect()"
      [class.loading]="status === 'loading'"
      [title]="status === 'ok' ? 'Position récupérée' : 'Récupérer ma position'"
    >
      <!-- Idle : cible -->
      @if (status === 'idle' || status === 'error') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
        </svg>
      }
      <!-- Loading : spinner -->
      @if (status === 'loading') {
        <span class="gps-spinner"></span>
      }
      <!-- OK : check -->
      @if (status === 'ok') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      }
    </button>
  </div>
  <span class="gps-hint" [ngClass]="status">
    @switch (status) {
      @case ('idle') {
        Cliquez pour détecter votre position automatiquement
      }
      @case ('loading') {
        Récupération en cours…
      }
      @case ('ok') {
        Position récupérée avec succès
      }
      @case ('error') {
        {{ errorMsg }}
      }
    }
  </span>
</div>
